services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: returns
      POSTGRES_PASSWORD: returns
      POSTGRES_DB: returns
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U returns -d returns"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://returns:returns@db:5432/returns
      AI_PROVIDER: mock
    depends_on:
      db:
        condition: service_healthy
